# --- 識別名 ---
CONFIG_ZMK_KEYBOARD_NAME="sosho-R"

# --- 通信・電力設定 ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_BAS=y

# --- ポインティングデバイス設定 ---
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_SPLIT_POINTING=y

# センサー用ドライバ (右手 = PINNACLE)
CONFIG_INPUT_PINNACLE=y

# --- ロータリーエンコーダー設定 ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=128

# --- 通信の安定化 ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# --- 処理能力の確保 (フリーズ防止) ---
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048