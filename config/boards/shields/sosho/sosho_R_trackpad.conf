CONFIG_ZMK_KEYBOARD_NAME="sosho"

# ========================================
# BLE通信＆安定化設定（バッファ拡張）
# ========================================
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_EVT_RX_COUNT=16

# ========================================
# 処理能力の強化（フリーズ防止用）
# ========================================
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ========================================
# ポインティングデバイス (Trackball/Trackpad 設定)
# ========================================
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_INPUT_INIT_PRIORITY=99

# トラックボール(PMW3610) / トラックパッド(PINNACLE) 両方を記述しておいてOKです
# （.overlayで無効化されている方は無視されるため、左右共通化できます）
CONFIG_INPUT_PMW3610=y
CONFIG_INPUT_PINNACLE=y

# ========================================
# ロータリーエンコーダー設定
# ========================================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=128

# ========================================
# バッテリー＆スリープ設定
# ========================================
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SLEEP=y
CONFIG_BT_BAS=y

# ========================================
# ハードウェア＆その他
# ========================================
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10