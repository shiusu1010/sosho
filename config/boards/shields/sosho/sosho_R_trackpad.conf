# --- 識別名 ---
CONFIG_ZMK_KEYBOARD_NAME="sosho-R"

# --- 通信・電力設定 ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_BAS=y

# ========================================================================
# 🛑 トラックパッドの完全無効化（究極の省エネ！）
# ========================================================================
# エンコーダー（ダイヤル）のために INPUT=y は残しつつ、
# トラックパッド用の通信（SPI）とドライバ（PINNACLE）を「n」にして封印します。
CONFIG_INPUT=y
CONFIG_SPI=n
CONFIG_INPUT_INIT_PRIORITY=99
CONFIG_INPUT_PINNACLE=n
CONFIG_ZMK_POINTING=n

# --- ロータリーエンコーダー設定 ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=128

# --- 通信の安定化 ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=n

# --- 処理能力の確保 ---
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# --- 特殊ピン設定 ---
CONFIG_NFCT_PINS_AS_GPIOS=y

# ========================================================================
# 🔋 バッテリー対策：LEDシステムの完全無効化
# ========================================================================
CONFIG_RGBLED_WIDGET=n
# CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
# CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10