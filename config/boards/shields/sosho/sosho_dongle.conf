# --- 画面表示の有効化 ---
# ここを y にしたことで、画面モジュールが動くようになります！
CONFIG_ZMK_DISPLAY=y

# --- 入力機能 ---
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

# --- HID（PCへのマウス通知）の有効化 ---
CONFIG_ZMK_MOUSE=y

# --- 通信安定化 ---
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ==========================================
# Prospector 追加ディスプレイ機能
# ==========================================

# --- リアルタイム打鍵速度（WPM）の有効化 ---
# タイピングスピードを検知して画面に数値を表示・連動させます
CONFIG_ZMK_WPM=y

# --- レイヤーローラー（アニメーション）の有効化 ---
# レイヤーを切り替えた際、ダイヤルが回るようなスライドアニメーションをONにします
CONFIG_PROSPECTOR_LAYER_SLIDE_DEFAULT=y