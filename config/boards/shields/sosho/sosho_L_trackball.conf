CONFIG_ZMK_KEYBOARD_NAME="sosho"

# ========================================
# BLE通信＆安定化設定（子機用）
# ========================================
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_EVT_RX_COUNT=16

# ========================================
# 処理能力の強化（トラックボールのフリーズ防止用）
# ========================================
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ========================================
# ポインティングデバイス (Trackball: PMW3610設定)
# ========================================
# エラー回避のため、システム上はオン(y)にしておきます
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_INPUT_INIT_PRIORITY=99
CONFIG_INPUT_PMW3610=y

# ========================================
# ロータリーエンコーダー設定
# ========================================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=128

# ========================================
# バッテリー＆スリープ設定（真犯人：完全封印）
# ========================================
# Windowsパニックの原因となるため、左手のバッテリー処理はすべて停止
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_SLEEP=n
CONFIG_BT_BAS=n

# ========================================
# 左右分割通信設定 (SPLIT)
# ========================================
# 本来は親機（右手）用の設定ですが、念のため=nを明記して完全封印
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n

# ========================================
# ハードウェア＆その他
# ========================================
# NFCピンをGPIOとして使用
CONFIG_NFCT_PINS_AS_GPIOS=y

# RGBLEDウィジェット（バッテリーインジケータ等）
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10