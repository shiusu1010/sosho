# --- 識別名 ---
CONFIG_ZMK_KEYBOARD_NAME="sosho-L"

# --- 通信・電力設定 ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_BAS=y

# --- ポインティングデバイス設定 ---
# 最新のZMKでは、この1行だけでポインティング機能全体が有効化されます
CONFIG_ZMK_POINTING=y

# センサー用ドライバ
# 最新システムでは、デバイスツリー（.overlay）の記述からドライバが自動で読み込まれます。
# ここに記述があると未定義エラー（Kconfig warnings）でビルドが止まるため、コメントアウト（削除）します。
# CONFIG_INPUT_PMW3610=y

# --- ロータリーエンコーダー設定 ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=128

# --- 通信の安定化 ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# ※最新のmain環境ではすでに標準統合されていることが多いため、念のためコメントアウトして安全を確保します
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# --- 処理能力の確保 ---
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048